<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | College Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <span>CollegeMaster Pro</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">📊 Dashboard</a></li>
            <li><a href="students.html">👨‍🎓 Students</a></li>
            <li><a href="courses.html" class="active">📚 Courses</a></li>
            <li><a href="add-student.html">➕ Add Student</a></li>
            <li><a href="about.html">ℹ️ About</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>📚 Available Courses</h2>
            </div>
            <div class="courses-grid" id="coursesGrid"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>➕ Add New Course</h3>
            </div>
            <div class="form-container">
                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" id="courseName" placeholder="e.g., Artificial Intelligence">
                </div>
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" id="courseCode" placeholder="e.g., AI501">
                </div>
                <div class="form-group">
                    <label>Credits</label>
                    <input type="number" id="credits" placeholder="3 or 4">
                </div>
                <button class="btn btn-primary" onclick="addCourse()">➕ Add Course</button>
            </div>
        </div>
    </div>

    <script>
        function loadCourses() {
            let courses = JSON.parse(localStorage.getItem('courses')) || [];
            let grid = document.getElementById('coursesGrid');
            grid.innerHTML = '';
            
            const icons = ['💻', '📊', '🔒', '🤖', '🎨', '⚡', '📈', '🧠'];
            
            courses.forEach((c, index) => {
                let card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <div class="course-icon">${icons[index % icons.length]}</div>
                    <div class="course-title">${c.name}</div>
                    <div class="course-code">${c.code}</div>
                    <div style="margin-top: 0.5rem; color: #10b981;">⭐ ${c.credits || 3} Credits</div>
                `;
                grid.appendChild(card);
            });
        }

        function addCourse() {
            let name = document.getElementById('courseName').value;
            let code = document.getElementById('courseCode').value;
            let credits = document.getElementById('credits').value;
            
            if (!name || !code) {
                alert('Please fill course name and code');
                return;
            }
            
            let courses = JSON.parse(localStorage.getItem('courses')) || [];
            let newId = courses.length ? Math.max(...courses.map(c => c.id)) + 1 : 1;
            courses.push({ id: newId, name, code, credits: credits || 3 });
            localStorage.setItem('courses', JSON.stringify(courses));
            
            document.getElementById('courseName').value = '';
            document.getElementById('courseCode').value = '';
            document.getElementById('credits').value = '';
            loadCourses();
        }

        loadCourses();
    </script>
</body>
</html>
