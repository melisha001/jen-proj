<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | College Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <span>CollegeMaster Pro</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">📊 Dashboard</a></li>
            <li><a href="students.html">👨‍🎓 Students</a></li>
            <li><a href="courses.html">📚 Courses</a></li>
            <li><a href="add-student.html" class="active">➕ Add Student</a></li>
            <li><a href="about.html">ℹ️ About</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>📝 Student Registration Form</h2>
            </div>
            <div class="form-container">
                <form id="studentForm">
                    <div class="form-group">
                        <label>👤 Full Name</label>
                        <input type="text" id="name" placeholder="Enter student's full name" required>
                    </div>
                    <div class="form-group">
                        <label>📧 Email Address</label>
                        <input type="email" id="email" placeholder="student@college.edu" required>
                    </div>
                    <div class="form-group">
                        <label>📚 Select Course</label>
                        <select id="course" required></select>
                    </div>
                    <div class="form-group">
                        <label>📅 Enrollment Date</label>
                        <input type="date" id="enrolledDate" value="2024-01-01">
                    </div>
                    <button type="submit" class="btn btn-primary">✨ Register Student</button>
                </form>
                <div id="message"></div>
            </div>
        </div>
    </div>

    <script>
        function loadCoursesIntoDropdown() {
            let courses = JSON.parse(localStorage.getItem('courses')) || [];
            let select = document.getElementById('course');
            select.innerHTML = '<option value="">Select a course...</option>';
            courses.forEach(c => {
                let option = document.createElement('option');
                option.value = c.name;
                option.text = c.name;
                select.appendChild(option);
            });
        }

        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let name = document.getElementById('name').value;
            let email = document.getElementById('email').value;
            let course = document.getElementById('course').value;
            let enrolledDate = document.getElementById('enrolledDate').value;

            if (!course) {
                alert('Please select a course');
                return;
            }

            let students = JSON.parse(localStorage.getItem('students')) || [];
            let newId = students.length ? Math.max(...students.map(s => s.id)) + 1 : 1;
            students.push({ id: newId, name, email, course, enrolledDate });
            localStorage.setItem('students', JSON.stringify(students));

            document.getElementById('message').innerHTML = '<div class="alert alert-success">✅ Student registered successfully!</div>';
            document.getElementById('studentForm').reset();
            setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
        });

        loadCoursesIntoDropdown();
    </script>
</body>
</html>
